<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="info" content="Alrededor de los EEUU" />
    <meta name="keywords" content="Lugares de Estados Unidos" />
    <meta name="author" content="Sergio Castro" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="stylesheet" href="./pages/index.css" />
    <title>Alrededor de los EU</title>
  </head>

  <body>
    <div class="page">
      <header class="header">
        <img class="header__logo" src="./images/logo_around.svg" alt="Logotipo de Around The U.S." />
      </header>

      <main class="content">
        <section class="profile">
          <div class="profile__container">
            <div class="profile__content">
              <div class="profile__avatar">
                <img class="profile__picture" alt="Foto de perfil del usuario" />
                <button class="profile__avatar-edit-button" type="button"></button>
              </div>
              <div class="profile__info">
                <h1 class="profile__info-name">Sergio Castro</h1>
                <p class="profile__info-description">Estudiante</p>
              </div>
              <button class="profile__info-edit-button" type="button"></button>
            </div>
          </div>
          <div>
            <button class="profile__info-add-button" type="button"></button>
          </div>
        </section>

        <section class="gallery">
          <!-- Las tarjetas se generarán dinámicamente con JavaScript -->
        </section>

        <template id="card-template">
          <div class="gallery__card">
            <img class="gallery__card-image" src="" alt="" />
            <button class="gallery__card-delete" type="button"></button>
            <div class="gallery__card-info">
              <h2 class="gallery__card-title"></h2>
              <button class="gallery__card-like" type="button"></button>
            </div>
          </div>
        </template>

        <!-- Popup: Editar perfil -->
        <section class="popup popup_type_edit" id="edit-popup">
          <div class="popup__container">
            <button class="popup__close-button" type="button"></button>
            <h2 class="popup__form-title">Editar perfil</h2>
            <form id="profile-form" class="popup__form" novalidate>
              <fieldset class="popup__form-fieldset">
                <input
                  class="popup__form-field-input popup__form-field-name"
                  type="text"
                  id="name-input"
                  name="name"
                  placeholder="Nombre"
                  minlength="2"
                  maxlength="40"
                  required
                />
                <span class="popup__form-field-error name-input-error"></span>
                <input
                  class="popup__form-field-input popup__form-field-description"
                  type="text"
                  id="description-input"
                  name="description"
                  placeholder="Acerca de mí"
                  minlength="2"
                  maxlength="200"
                  required
                />
                <span class="popup__form-field-error description-input-error"></span>
                <button type="submit" class="popup__form-button popup__form-save-button">Guardar</button>
              </fieldset>
            </form>
          </div>
        </section>

        <!-- Popup: Nuevo lugar -->
        <section class="popup popup_type_add" id="add-popup">
          <div class="popup__container">
            <button class="popup__close-button" type="button"></button>
            <h2 class="popup__form-title">Nuevo Lugar</h2>
            <form id="add-form" class="popup__form popup__add-form" novalidate>
              <fieldset class="popup__form-fieldset">
                <input
                  class="popup__form-field-input popup__add-form-field-title"
                  type="text"
                  id="title-add-card"
                  name="name"
                  placeholder="Título"
                  minlength="2"
                  maxlength="30"
                  required
                />
                <span class="popup__form-field-error title-add-card-error"></span>
                <input
                  class="popup__form-field-input popup__add-form-field-image"
                  type="url"
                  id="link-add-card"
                  name="link"
                  placeholder="Enlace a la imagen"
                  required
                />
                <span class="popup__form-field-error link-add-card-error"></span>
                <button type="submit" class="popup__form-button popup__add-form-create-button">Crear</button>
              </fieldset>
            </form>
          </div>
        </section>

        <!-- Popup: Cambiar foto de perfil -->
        <section class="popup popup_type_avatar" id="avatar-popup">
          <div class="popup__container popup__container_type_avatar">
            <button class="popup__close-button" type="button"></button>
            <h2 class="popup__form-title">Cambiar foto de perfil</h2>
            <form id="avatar-form" class="popup__form" novalidate>
              <fieldset class="popup__form-fieldset">
                <input
                  class="popup__form-field-input"
                  type="url"
                  id="avatar-input"
                  name="avatar"
                  placeholder="Enlace a la nueva foto de perfil"
                  required
                />
                <span class="popup__form-field-error avatar-input-error"></span>
                <button type="submit" class="popup__form-button popup__form-save-button">Guardar</button>
              </fieldset>
            </form>
          </div>
        </section>

        <!-- Popup: Confirmar eliminación de tarjeta -->
        <section class="popup popup_type_delete" id="delete-popup">
          <div class="popup__container popup__container_type_delete">
            <button class="popup__close-button" type="button"></button>
            <h2 class="popup__form-title">¿Estás seguro?</h2>
            <button type="button" class="popup__form-button popup__confirm-button">Sí</button>
          </div>
        </section>

        <!-- Popup: Imágen -->
        <section class="popup popup_type_image" id="image-popup">
          <div class="popup__image">
            <button class="popup__close-button" type="button"></button>
            <div class="popup__image-container">
              <img class="popup__image-photo" src="" alt="" />
            </div>
            <div class="popup__image-text-container">
              <p class="popup__image-text"></p>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p class="footer__text">© 2026 Sergio Castro</p>
      </footer>
    </div>

    <script type="module" src="./pages/index.js"></script>
  </body>
</html>
